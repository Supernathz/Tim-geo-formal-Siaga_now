<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SiagaNow – E-Mitigasi</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root{
  /* PRIMARY */
  --primary:#4caf50;
  --primary-light:#a5d6a7;
  --primary-dark:#2e7d32;

  /* SEMANTIC */
  --success:var(--primary);
  --danger:#c62828;
  --danger-light:#ef5350;
  --info:#1565c0;
  --info-light:#42a5f5;
  --warning:#ff9800;
  --warning-light:#ffb74d;

  /* NEUTRALS */
  --white:#f3f4f6;
  --grey:#6b7280;
  --dark:#0f172a;
  --dark-2:#111827;

  --border:rgba(255,255,255,0.08);
  --card-bg:rgba(255,255,255,0.03);

  /* EFFECTS */
  --primary-soft:color-mix(in srgb,var(--primary) 10%,transparent);
  --primary-border:color-mix(in srgb,var(--primary) 30%,transparent);
  --primary-glow:color-mix(in srgb,var(--primary) 40%,transparent);
  --primary-glow-strong:color-mix(in srgb,var(--primary) 65%,transparent);
}

*,
*::before,
*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Outfit',sans-serif;
  background:var(--dark);
  color:var(--white);
  overflow-x:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:var(--dark);
}

::-webkit-scrollbar-thumb{
  background:var(--primary);
  border-radius:999px;
}

::-webkit-scrollbar-thumb:hover{
  background:var(--primary-light);
}

::selection{
  background:var(--primary);
  color:white;
}

/* NAV */

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:18px 5%;

  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(12px);

  border-bottom:1px solid var(--border);
}

.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.8rem;
  letter-spacing:2px;
  color:var(--primary);
}

.nav-links{
  display:flex;
  gap:28px;
  list-style:none;
}

.nav-links a{
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:.9rem;
  font-weight:500;
  transition:color .2s;
}

.nav-links a:hover{
  color:var(--primary);
}

/* HERO */

#hero{
  min-height:100vh;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-align:center;
  position:relative;

  padding:120px 5% 80px;

  overflow:hidden;
}

#hero-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

#hero>*:not(#hero-canvas){
  position:relative;
  z-index:1;
}

.disaster-tabs{
  display:flex;
  gap:10px;
  margin-bottom:28px;
  justify-content:center;

  animation:fadeUp .6s .05s ease both;
}

.dtab{
  padding:6px 18px;
  border-radius:999px;

  border:1px solid rgba(255,255,255,0.15);

  font-size:.78rem;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;

  background:transparent;
  color:rgba(255,255,255,0.45);

  cursor:pointer;

  transition:.25s;
}

.dtab:hover{
  border-color:var(--primary-border);
}

.dtab.active{
  color:white;
  background:var(--primary-soft);
  border-color:var(--primary-border);
}

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;

  background:var(--primary-soft);
  border:1px solid var(--primary-border);

  color:var(--primary-light);

  font-size:.8rem;
  font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;

  padding:6px 16px;
  border-radius:999px;

  margin-bottom:28px;

  animation:fadeUp .6s ease both;
}

.hero-badge span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--primary);

  animation:pulse 1.5s infinite;
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,14vw,11rem);
  line-height:.92;
  letter-spacing:3px;

  background:linear-gradient(
    135deg,
    var(--white) 30%,
    var(--primary) 70%,
    var(--primary-dark)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;

  animation:fadeUp .7s .1s ease both;
}

.hero-sub{
  font-size:clamp(1rem,2.5vw,1.3rem);
  color:rgba(255,255,255,0.6);

  margin:18px auto 40px;
  max-width:500px;

  font-style:italic;

  animation:fadeUp .7s .2s ease both;
}

.cta-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;

  background:var(--primary);
  color:white;

  font-weight:700;
  font-size:1rem;
  letter-spacing:.5px;

  padding:16px 36px;
  border-radius:8px;

  text-decoration:none;

  transition:transform .2s,box-shadow .2s;

  animation:fadeUp .7s .3s ease both;

  box-shadow:0 0 40px var(--primary-glow);
}

.cta-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 50px var(--primary-glow-strong);
}

.hero-scroll{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;

  color:rgba(255,255,255,0.3);

  font-size:.75rem;
  letter-spacing:1px;
}

.hero-scroll::after{
  content:'';
  width:1px;
  height:40px;

  background:linear-gradient(
    to bottom,
    var(--primary),
    transparent
  );

  animation:scrollLine 1.5s infinite;
}

/* SECTIONS */

section{
  padding:90px 5%;
}

.section-label{
  font-size:.75rem;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;

  color:var(--primary);

  margin-bottom:10px;
}

.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.5rem,6vw,4rem);

  line-height:1;
  margin-bottom:14px;
}

.section-desc{
  color:rgba(255,255,255,0.55);
  font-size:.95rem;

  max-width:560px;
  margin-bottom:50px;
}

/* BACKGROUNDS */

#katalog,
#blog,
footer{
  background:var(--dark-2);
}

/* CARDS */

.katalog-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}

.bencana-card,
.checklist-card,
.quiz-card,
.blog-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:16px;
}

.bencana-card{
  overflow:hidden;
  position:relative;
  transition:transform .3s,border-color .3s;
}

.bencana-card:hover{
  transform:translateY(-6px);
  border-color:var(--primary-border);
}

.card-glow{
  position:absolute;
  inset:0;
  border-radius:16px;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;

  border:1px solid var(--primary-border);
}

.bencana-card:hover .card-glow{
  opacity:1;
}

.card-icon-wrap{
  height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:4rem;

  background:linear-gradient(
    135deg,
    color-mix(in srgb,var(--primary-dark) 65%,black),
    color-mix(in srgb,var(--primary) 35%,black)
  );
}

.card-body{
  padding:24px;
}

.card-type{
  font-size:.7rem;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;

  color:var(--primary-light);

  margin-bottom:8px;
}

.card-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.8rem;
  margin-bottom:10px;
}

.card-msg{
  font-size:.9rem;
  line-height:1.6;
  color:rgba(255,255,255,0.6);
}

.card-tip{
  margin-top:16px;

  display:flex;
  gap:10px;

  background:rgba(255,255,255,0.04);

  border-radius:8px;
  padding:12px;

  font-size:.82rem;
  color:rgba(255,255,255,0.5);
}

/* LAB */

#lab{
  background:var(--dark);
}

.lab-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
}

.checklist-card,
.quiz-card{
  padding:30px;
}

.checklist-card h3,
.quiz-card h3{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;
  margin-bottom:6px;
}

.checklist-sub,
.quiz-sub{
  color:rgba(255,255,255,0.45);
  font-size:.85rem;
  margin-bottom:24px;
}

.checklist-item{
  display:flex;
  align-items:center;
  gap:14px;

  padding:14px;
  border-radius:10px;

  border:1px solid transparent;

  margin-bottom:8px;

  cursor:pointer;
  user-select:none;

  transition:.2s;
}

.checklist-item:hover{
  background:rgba(255,255,255,0.04);
}

.checklist-item.checked{
  background:var(--primary-soft);
  border-color:var(--primary-border);
}

.check-box{
  width:22px;
  height:22px;

  border-radius:6px;

  border:2px solid rgba(255,255,255,0.25);

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;
}

.checklist-item.checked .check-box{
  background:var(--primary);
  border-color:var(--primary);
}

.progress-track{
  height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;

  background:linear-gradient(
    90deg,
    var(--primary),
    var(--primary-light)
  );
}

/* QUIZ */

.quiz-num,
.score-num{
  color:var(--primary);
}

.quiz-opt{
  display:flex;
  align-items:center;
  gap:12px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);

  border-radius:10px;
  padding:13px 16px;

  cursor:pointer;

  transition:.2s;
}

.quiz-opt:hover{
  background:var(--primary-soft);
  border-color:var(--primary-border);
}

.quiz-btn{
  padding:10px 22px;
  border-radius:8px;

  border:none;

  font-weight:600;
  cursor:pointer;
}

.quiz-btn.primary{
  background:var(--primary);
  color:white;
}

.quiz-btn.primary:hover{
  background:var(--primary-light);
  color:black;
}

/* BLOG */

.blog-card{
  overflow:hidden;
  max-width:860px;
  margin:0 auto;
}

.blog-header{
  padding:36px 40px;

  border-bottom:1px solid var(--border);

  background:linear-gradient(
    135deg,
    color-mix(in srgb,var(--primary) 12%,transparent),
    transparent
  );
}

.blog-tag{
  font-size:.7rem;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;

  color:var(--primary-light);

  margin-bottom:12px;
}

.blog-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:2.2rem;
  line-height:1.1;

  margin-bottom:10px;
}

.blog-content{
  padding:36px 40px;
}

.blog-point{
  display:flex;
  gap:18px;

  margin-bottom:28px;
  padding-bottom:28px;

  border-bottom:1px solid var(--border);
}

.blog-point:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}

.blog-point-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:3rem;

  color:var(--primary);

  opacity:.35;
}

/* FOOTER */

footer{
  border-top:1px solid var(--border);
  padding:60px 5% 36px;
}

.footer-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:40px;

  margin-bottom:50px;
}

.footer-brand .nav-logo{
  display:block;
  margin-bottom:12px;
}

.footer-brand p{
  font-size:.85rem;
  line-height:1.6;
  color:rgba(255,255,255,0.4);
}

.footer-col h5{
  font-size:.85rem;
  margin-bottom:16px;
}

.emergency-num{
  display:flex;
  align-items:center;
  gap:12px;

  padding:12px 16px;

  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);

  border-radius:10px;

  margin-bottom:8px;

  text-decoration:none;

  transition:border-color .2s;
}

.emergency-num:hover{
  border-color:var(--primary);
}

.num-badge{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;

  padding:4px 10px;
  border-radius:6px;
}

.num-badge.red,
.num-badge.orange,
.num-badge.blue,
.num-badge.green{
  background:var(--primary-soft);
  border:1px solid var(--primary-border);
  color:var(--primary-light);
}

/* ANIMATIONS */

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.3}
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes scrollLine{
  0%{
    opacity:0;
    transform:scaleY(0);
    transform-origin:top;
  }
  50%{
    opacity:1;
  }
  100%{
    opacity:0;
    transform:scaleY(1);
    transform-origin:top;
  }
}

/* RESPONSIVE */

@media(max-width:768px){

  nav{
    padding:14px 4%;
  }

  .nav-links{
    display:none;
  }

  h1{
    font-size:clamp(4rem,18vw,7rem);
  }

  section{
    padding:60px 4%;
  }

  .katalog-grid,
  .lab-grid,
  .footer-grid{
    grid-template-columns:1fr;
  }

  .blog-header,
  .blog-content{
    padding:24px 22px;
  }
}
</style>
</head>

<body>

<nav>
  <span class="nav-logo">SiagaNow</span>

  <ul class="nav-links">
    <li><a href="#katalog">Katalog</a></li>
    <li><a href="#lab">Lab</a></li>
    <li><a href="#blog">Edukasi</a></li>
    <li><a href="#footer">Darurat</a></li>
  </ul>
</nav>

<section id="hero">
  <canvas id="hero-canvas"></canvas>

  <div class="disaster-tabs">
    <button class="dtab active">Gempa</button>
    <button class="dtab">Banjir</button>
    <button class="dtab">Longsor</button>
  </div>

  <div class="hero-badge">
    <span></span>
    E-Mitigasi Bencana
  </div>

  <h1>SiagaNow</h1>

  <p class="hero-sub">
    Karena bencana bisa datang kapan saja
  </p>

  <a href="#lab" class="cta-btn">
    Mulai Kuis
  </a>

  <div class="hero-scroll">
    SCROLL
  </div>
</section>

</body>
</html>
```
