<style>
  :root {
    /* PRIMARY SYSTEM */
    --primary: #4caf50;
    --primary-light: #a5d6a7;
    --primary-dark: #2e7d32;

    /* SEMANTIC COLORS */
    --success: var(--primary);
    --danger: #c62828;
    --danger-light: #ef5350;
    --info: #1565c0;
    --info-light: #42a5f5;
    --warning: #ff9800;
    --warning-light: #ffb74d;

    /* NEUTRALS */
    --white: #f3f4f6;
    --grey: #6b7280;
    --dark: #0f172a;
    --dark-2: #111827;

    --border: rgba(255,255,255,0.08);
    --card-bg: rgba(255,255,255,0.03);

    /* EFFECTS */
    --primary-glow: color-mix(in srgb, var(--primary) 40%, transparent);
    --primary-glow-strong: color-mix(in srgb, var(--primary) 60%, transparent);
    --primary-soft: color-mix(in srgb, var(--primary) 10%, transparent);
    --primary-border: color-mix(in srgb, var(--primary) 30%, transparent);
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--dark);
    color: var(--white);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 18px 5%;

    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);

    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--primary);
  }

  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: .9rem;
    font-weight: 500;
    transition: color .2s;
  }

  .nav-links a:hover {
    color: var(--primary);
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-align: center;
    position: relative;

    padding: 120px 5% 80px;

    background: var(--dark);
    overflow: hidden;
  }

  #hero-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #hero > *:not(#hero-canvas) {
    position: relative;
    z-index: 1;
  }

  /* DISASTER TABS */
  .disaster-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;

    animation: fadeUp .6s .05s ease both;
  }

  .dtab {
    padding: 6px 18px;
    border-radius: 999px;

    border: 1px solid rgba(255,255,255,0.15);

    font-size: .78rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;

    cursor: pointer;

    transition: all .25s;

    background: transparent;
    color: rgba(255,255,255,0.45);
  }

  .dtab.active {
    color: white;
    background: var(--primary-soft);
    border-color: var(--primary-border);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;

    background: var(--primary-soft);
    border: 1px solid var(--primary-border);

    color: var(--primary-light);

    font-size: .8rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;

    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 28px;

    animation: fadeUp .6s ease both;
  }

  .hero-badge span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--primary);

    animation: pulse 1.5s infinite;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem,14vw,11rem);
    line-height: .92;
    letter-spacing: 3px;

    background: linear-gradient(
      135deg,
      var(--white) 30%,
      var(--primary) 70%,
      var(--primary-dark)
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    animation: fadeUp .7s .1s ease both;
  }

  .hero-sub {
    font-size: clamp(1rem,2.5vw,1.3rem);
    color: rgba(255,255,255,0.6);

    margin: 18px auto 40px;
    max-width: 500px;

    font-style: italic;

    animation: fadeUp .7s .2s ease both;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;

    background: var(--primary);
    color: white;

    font-weight: 700;
    font-size: 1rem;
    letter-spacing: .5px;

    padding: 16px 36px;
    border-radius: 8px;

    text-decoration: none;

    transition: transform .2s, box-shadow .2s;

    animation: fadeUp .7s .3s ease both;

    box-shadow: 0 0 40px var(--primary-glow);
  }

  .cta-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 50px var(--primary-glow-strong);
  }

  .cta-btn svg {
    width: 18px;
    height: 18px;
  }

  .hero-scroll {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;

    color: rgba(255,255,255,0.3);

    font-size: .75rem;
    letter-spacing: 1px;

    animation: fadeIn 1s 1s ease both;
  }

  .hero-scroll::after {
    content: '';
    width: 1px;
    height: 40px;

    background: linear-gradient(
      to bottom,
      var(--primary),
      transparent
    );

    animation: scrollLine 1.5s infinite;
  }

  /* SECTIONS */
  section {
    padding: 90px 5%;
  }

  .section-label {
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;

    color: var(--primary);

    margin-bottom: 10px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem,6vw,4rem);
    line-height: 1;

    margin-bottom: 14px;
  }

  .section-desc {
    color: rgba(255,255,255,0.55);
    font-size: .95rem;

    max-width: 560px;
    margin-bottom: 50px;
  }

  /* BACKGROUNDS */
  #katalog,
  #blog,
  footer {
    background: var(--dark-2);
  }

  #lab {
    background: var(--dark);
  }

  /* CARDS */
  .bencana-card,
  .checklist-card,
  .quiz-card,
  .blog-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
  }

  .bencana-card:hover {
    border-color: var(--primary-border);
  }

  .checklist-item.checked {
    background: var(--primary-soft);
    border-color: var(--primary-border);
  }

  .checklist-item.checked .check-box {
    background: var(--primary);
    border-color: var(--primary);
  }

  .progress-fill {
    background: linear-gradient(
      90deg,
      var(--primary),
      var(--primary-light)
    );
  }

  .quiz-num,
  .score-num,
  .blog-point-num {
    color: var(--primary);
  }

  .quiz-opt:hover {
    background: var(--primary-soft);
    border-color: var(--primary-border);
  }

  .quiz-btn.primary {
    background: var(--primary);
    color: white;
  }

  .quiz-btn.primary:hover {
    background: var(--primary-light);
    color: black;
  }

  .emergency-num:hover {
    border-color: var(--primary);
  }

  .footer-brand .nav-logo {
    color: var(--primary);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar {
    width: 10px;
  }

  ::-webkit-scrollbar-track {
    background: var(--dark);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 999px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--primary-light);
  }

  /* SELECTION */
  ::selection {
    background: var(--primary);
    color: white;
  }

  /* ANIMATIONS */
  @keyframes pulse {
    0%,100% { opacity:1 }
    50% { opacity:.3 }
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scrollLine {
    0% {
      opacity: 0;
      transform: scaleY(0);
      transform-origin: top;
    }
    50% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: scaleY(1);
      transform-origin: top;
    }
  }

  /* RESPONSIVE */
  @media(max-width:768px) {
    nav {
      padding: 14px 4%;
    }

    .nav-links {
      display: none;
    }

    h1 {
      font-size: clamp(4rem,18vw,7rem);
    }

    section {
      padding: 60px 4%;
    }

    .katalog-grid,
    .lab-grid,
    .footer-grid {
      grid-template-columns: 1fr;
    }

    .blog-header,
    .blog-content {
      padding: 24px 22px;
    }
  }
</style>
